version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pfsm-postgres-prod
    environment:
      POSTGRES_DB: personal_finance_db
      POSTGRES_USER: pfsm_user
      POSTGRES_PASSWORD: pfsm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./server/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - pfsm-network-prod
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pfsm-backend-prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://pfsm_user:pfsm_password@postgres:5432/personal_finance_db
      PORT: 5000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/logs:/app/logs
    networks:
      - pfsm-network-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
    container_name: pfsm-frontend-prod
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - pfsm-network-prod
    restart: unless-stopped

volumes:
  postgres_data_prod:

networks:
  pfsm-network-prod:
    driver: bridge

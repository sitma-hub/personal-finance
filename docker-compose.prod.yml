# Production-style compose: no bind mounts, runs built images as the node user (uid 1000).
services:
  postgres:
    image: postgres:15-alpine
    container_name: pfsm-postgres
    environment:
      POSTGRES_DB: personal_finance_db
      POSTGRES_USER: pfsm_user
      POSTGRES_PASSWORD: pfsm_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - pfsm-network

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: production
    container_name: pfsm-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://pfsm_user:pfsm_password@postgres:5432/personal_finance_db
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - pfsm-network

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: production
    container_name: pfsm-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    networks:
      - pfsm-network

volumes:
  postgres_data:

networks:
  pfsm-network:
    driver: bridge

services:
  postgres:
    image: postgres:15-alpine
    container_name: pfsm-postgres
    environment:
      POSTGRES_DB: personal_finance_db
      POSTGRES_USER: pfsm_user
      POSTGRES_PASSWORD: pfsm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - pfsm-network

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: development
    container_name: pfsm-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://pfsm_user:pfsm_password@postgres:5432/personal_finance_db
      PORT: 5000
      DOCKER_UID: ${DOCKER_UID:-1000}
      DOCKER_GID: ${DOCKER_GID:-1000}
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    volumes:
      - ./server:/app
      - backend_node_modules:/app/node_modules
    networks:
      - pfsm-network

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: development
    container_name: pfsm-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
      DOCKER_UID: ${DOCKER_UID:-1000}
      DOCKER_GID: ${DOCKER_GID:-1000}
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - pfsm-network

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  pfsm-network:
    driver: bridge

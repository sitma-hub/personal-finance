services:
  postgres:
    image: postgres:15-alpine
    container_name: pfsm-postgres
    environment:
      POSTGRES_DB: personal_finance_db
      POSTGRES_USER: pfsm_user
      POSTGRES_PASSWORD: pfsm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - pfsm-network

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: development
    container_name: pfsm-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://pfsm_user:pfsm_password@postgres:5432/personal_finance_db
      PORT: 5000
      DOCKER_UID: ${DOCKER_UID:-1000}
      DOCKER_GID: ${DOCKER_GID:-1000}
      # Optional local LLM analysis (see the "llm" compose profile below).
      # Leave unset to auto-enable when the ollama service is running; set false to opt out.
      LLM_ENABLED: ${LLM_ENABLED:-}
      # Default: Windows-native Ollama (Task Manager GPU 1 on hybrid laptops).
      # Docker Ollama: set OLLAMA_URL=http://ollama:11434 and use --profile llm.
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      # Context window for the LLM. Raised from Ollama's 2048 default so the full
      # database record dump fits when answering follow-up questions.
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      # Qwen3 hybrid "thinking" mode — set true for deeper reasoning (slower).
      OLLAMA_THINK: ${OLLAMA_THINK:-}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_started
      ollama:
        condition: service_started
        required: false
    volumes:
      - ./server:/app
      - backend_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pfsm-network

  frontend:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: development
    container_name: pfsm-frontend
    environment:
      VITE_API_URL: http://localhost:5000/api
      DOCKER_UID: ${DOCKER_UID:-1000}
      DOCKER_GID: ${DOCKER_GID:-1000}
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - pfsm-network

  # Optional Docker Ollama (Linux / headless). On WSL + Intel+NVIDIA laptops prefer
  # Windows-native Ollama instead — see README. Enable with:
  #   OLLAMA_URL=http://ollama:11434 docker compose --profile llm up -d
  # Then pull the model once:
  #   docker compose --profile llm exec ollama ollama pull qwen3:8b
  ollama:
    image: ollama/ollama:latest
    container_name: pfsm-ollama
    profiles: ["llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - pfsm-network
    # GPU acceleration (NVIDIA). Requires the NVIDIA Container Toolkit on the host.
    # On hybrid laptops Windows Task Manager lists the Intel iGPU as "GPU 0" and the
    # NVIDIA dGPU as "GPU 1". Inside WSL/Docker that NVIDIA card is always index 0 —
    # set NVIDIA_VISIBLE_DEVICES in .env to override (e.g. "1" on multi-GPU hosts).
    # If you have no NVIDIA GPU, remove the `deploy` block to run Ollama on CPU.
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-0}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Maximize NVIDIA GPU usage (Task Manager "GPU 1" on hybrid laptops).
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KV_CACHE_TYPE: q8_0
      OLLAMA_GPU_OVERHEAD: "0"
      OLLAMA_MAX_LOADED_MODELS: "1"
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_KEEP_ALIVE: 30m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${NVIDIA_DEVICE_ID:-0}"]
              capabilities: [gpu]

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
  ollama_data:

networks:
  pfsm-network:
    driver: bridge
